name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

jobs:
  test:
    name: Test Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12']

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[dev]" || pip install -e ".[dev]" --no-deps

    - name: Run tests with coverage
      run: |
        pytest --cov=src/toolkit_data_contracts_drift --cov-report=xml --cov-report=term -v

    - name: Upload coverage
      uses: codecov/codecov-action@v6
      if: matrix.python-version == '3.11'
      with:
        file: ./coverage.xml


  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    - name: Install dependencies
      run: pip install bandit safety
    - name: Run Bandit
      run: bandit -r src/ -f json -o bandit-report.json
    - name: Upload Bandit report
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: bandit-report
        path: bandit-report.json
    - name: Run Safety
      run: safety check --json

  lint:
    name: Code Quality
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    - name: Install dependencies
      run: pip install ruff mypy
    - name: Run ruff
      run: ruff check src/ tests/
    - name: Run mypy
      run: mypy src/ --ignore-missing-imports

  sbom:
    name: SBOM Generation
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Install Syft
      run: curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh | sh -s -- -b /usr/local/bin
    - name: Generate SBOM (CycloneDX)
      run: syft dir:. -o cyclonedx-json=sbom.cdx.json
    - name: Install Grype
      run: curl -sSfL https://raw.githubusercontent.com/anchore/grype/main/install.sh | sh -s -- -b /usr/local/bin
    - name: Scan SBOM for vulnerabilities
      run: grype sbom:sbom.cdx.json --fail-on critical
    - name: Upload SBOM artifact
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: sbom
        path: sbom.cdx.json

  build:
    name: Build Package
    runs-on: ubuntu-latest
    needs: [test, security, lint]
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    - name: Install build tools
      run: pip install build twine
    - name: Build package
      run: python -m build
    - name: Check package
      run: twine check dist/*
    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: dist-packages
        path: dist/

  docker:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: [test]
    steps:
    - uses: actions/checkout@v4
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
    - name: Build Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        push: false
        tags: toolkit-data-contracts-drift:latest
        cache-from: type=gha
        cache-to: type=gha,mode=max

  all-checks:
    name: All Checks
    if: always()
    needs: [test, security, lint, sbom, build, docker]
    runs-on: ubuntu-latest
    steps:
    - name: Verify all jobs passed
      run: |
        if [[ "${{ contains(needs.*.result, 'failure') }}" == "true" ]]; then
          echo "One or more jobs failed"
          exit 1
        fi
        if [[ "${{ contains(needs.*.result, 'cancelled') }}" == "true" ]]; then
          echo "One or more jobs were cancelled"
          exit 1
        fi
        echo "All checks passed"
